<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>正答率チェッカー v2</title>
  <style>
    :root {
      --primary: #667eea;
      --accent: #764ba2;
      --bg: #f6f7fb;
      --card: #ffffff;
      --muted: #999;
      --success: #28a745;
      --danger: #dc3545;
      --warn: #ff9800;
    }
    * { box-sizing: border-box; margin:0; padding:0 }
    body { font-family: "Noto Sans JP", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, var(--primary), var(--accent)); min-height:100vh; padding:20px }
    .container { max-width:1200px; margin:0 auto; background:var(--card); border-radius:12px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.2) }
    header { padding:28px 30px; color:#fff; background: linear-gradient(135deg, var(--primary), var(--accent)); text-align:center }
    header h1{ font-size:1.6rem; margin-bottom:6px }
    header p{ opacity:.95; font-size:.95rem }
    .tabbar{ display:flex; background:#f0f2f6; border-bottom:1px solid #e0e3eb }
    .tab-button{ flex:1; padding:14px 18px; border:none; background:transparent; cursor:pointer; font-weight:600; color:#444; transition:all .3s }
    .tab-button:hover{ background:#fff }
    .tab-button.active{ color:var(--primary); background:#fff; border-bottom:3px solid var(--primary) }
    .content{ display:none; padding:22px 30px }
    .content.active{ display:block }
    .section{ background:#f8f9fa; padding:16px; border-radius:10px; border:1px solid #e6e9ef; margin-bottom:20px }
    .form-grid{ display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); margin-bottom:14px }
    .form-group{ display:flex; flex-direction:column }
    .form-group label{ font-size:.85rem; font-weight:600; margin-bottom:6px; color:#333 }
    input[type=text], input[type=number], input[type=email], input[type=date]{ padding:8px 10px; border:1px solid #d7dbe6; border-radius:6px; font-size:.9rem }
    input[type=checkbox]{ width:18px; height:18px; cursor:pointer }
    .checkbox-label{ display:flex; align-items:center; gap:8px; cursor:pointer }
    .button-group{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px }
    .btn{ padding:10px 16px; border-radius:6px; border:none; cursor:pointer; font-weight:700; font-size:.9rem }
    .btn-primary{ background:var(--primary); color:#fff }
    .btn-success{ background:var(--success); color:#fff }
    .btn-warn{ background:var(--warn); color:#fff }
    .btn-danger{ background:var(--danger); color:#fff }
    .stats-row{ display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap }
    .stat-card{ flex:1; min-width:140px; background: linear-gradient(135deg, var(--primary), var(--accent)); color:#fff; padding:16px; border-radius:10px; text-align:center }
    .stat-card h3{ font-size:.8rem; opacity:.9; margin-bottom:8px }
    .stat-value{ font-size:2rem; font-weight:800 }
    .grid-area{ display:grid; grid-template-columns: repeat(auto-fill, minmax(70px,1fr)); gap:10px; margin-bottom:20px }
    .grid-cell{ aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; border:2px solid #e6e9ef; background:#fff; cursor:pointer; user-select:none; transition:all .2s; font-weight:700; padding:6px }
    .grid-cell.correct{ background: linear-gradient(180deg,#e8fff0,#daf7e0); border-color:var(--success); color:#155724 }
    .grid-cell.wrong{ background: linear-gradient(180deg,#ffe8e8,#ffdada); border-color:var(--danger); color:#721c24 }
    .grid-cell .num{ font-size:1.1rem }
    .grid-cell .page{ font-size:.7rem; margin-top:4px; opacity:.8 }
    .list-item{ display:flex; justify-content:space-between; padding:10px; border-bottom:1px dashed #e6e9ef; align-items:center; gap:12px }
    .folder-tree, .candidate-list, .tab2-records { margin-bottom:12px }
    .folder-item{ padding:10px; margin-bottom:8px; background:#fff; border-radius:6px; border:1px solid #e6e9ef; cursor:pointer }
    .folder-item.active{ background:#e8f4ff; border-color:var(--primary) }
    .record-item{ background:#fff; padding:12px; border-radius:6px; margin-bottom:8px; border-left:3px solid var(--primary); cursor:pointer }
    .record-item.selected{ background:#e8f4ff }
    .record-title{ font-weight:700; font-size:.9rem; color:#333; margin-bottom:4px }
    .record-meta{ font-size:.75rem; color:#999 }
    .modal{ position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:9999 }
    .modal.active{ display:flex }
    .modal-box{ background:var(--card); padding:20px; border-radius:10px; width:90%; max-width:1000px; max-height:80vh; overflow:auto }
    .drag-assign-container{ display:grid; grid-template-columns:1fr 1fr; gap:16px }
    .drag-item{ background:#fff; padding:12px; border-radius:6px; margin-bottom:8px; border-left:4px solid var(--primary); cursor:move; display:flex; justify-content:space-between; align-items:center }
    .drag-drop-zone{ border:2px dashed #d7dbe6; border-radius:6px; padding:20px; text-align:center }
    .ebbinghaus-panel{ background:#fff; border:1px solid #d7dbe6; border-radius:6px; padding:12px; margin-top:12px }
    @media (max-width:768px){ .form-grid{ grid-template-columns:1fr } .grid-area{ grid-template-columns: repeat(auto-fill,minmax(60px,1fr)) } .drag-assign-container{ grid-template-columns:1fr } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 正答率チェッカー v2</h1>
      <p>完全修正版 — ドラッグ振替・忘却曲線・自動送信スケジュール対応</p>
    </header>

    <div class="tabbar" role="tablist">
      <button class="tab-button active" data-tab="tab1">📋 基本モード</button>
      <button class="tab-button" data-tab="tab2">📁 フォルダ管理</button>
    </div>

    <!-- TAB1 -->
    <div class="content active" id="tab1">
      <div class="section">
        <h2>⚙️ 設定</h2>
        <div class="form-grid">
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" id="tab1-use-candidates" /> 変換候補を表示</label>
          </div>
          <div class="form-group">
            <label>問題セット名</label>
            <input type="text" id="tab1-title" value="問題セット" />
          </div>
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" id="tab1-use-count" checked /> 問題数指定</label>
            <input type="number" id="tab1-count" min="1" value="30" />
          </div>
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" id="tab1-use-pages" checked /> ページ管理</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px;">
              <input type="number" id="tab1-start" min="1" value="11" placeholder="開始ページ" />
              <input type="number" id="tab1-end" min="1" value="25" placeholder="終了ページ" />
            </div>
          </div>
          <div class="form-group">
            <label>各ページの問題数</label>
            <input type="number" id="tab1-per-page" min="1" value="2" />
          </div>
          <div class="form-group">
            <label>ページ別設定（例: 11-15:4,16:3,20:5）</label>
            <input type="text" id="tab1-custom" placeholder="11-15:4,16:3" />
          </div>
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" id="tab1-skip-enable" /> 飛ばすページ指定</label>
            <input type="text" id="tab1-skip" placeholder="例: 41-50,56" disabled />
          </div>
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" id="tab1-enable-ebbinghaus" checked /> 忘却曲線（1,7,16,35,62日）を自動登録</label>
          </div>
          <div class="form-group">
            <label class="checkbox-label"><input type="checkbox" id="tab1-merge-same-day" checked /> 同一日まとめて1通にする</label>
          </div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="tab1-apply">✅ 設定を反映</button>
        <button class="btn btn-success" id="tab1-save">💾 結果を記録（＋スケジュール登録）</button>
        <button class="btn btn-warn" id="tab1-export">📥 エクスポート</button>
        <button class="btn btn-danger" id="tab1-clear">🗑️ 全削除</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <h3>全体正答率</h3>
          <div class="stat-value" id="tab1-rate">-</div>
        </div>
        <div class="stat-card">
          <h3>間違い数</h3>
          <div class="stat-value" id="tab1-wrong">-</div>
        </div>
        <div class="stat-card">
          <h3>問題数</h3>
          <div class="stat-value" id="tab1-total">0</div>
        </div>
      </div>

      <div class="section">
        <h2>🎯 採点グリッド</h2>
        <div class="grid-area" id="tab1-grid"></div>
      </div>

      <!-- 成績推移は要望で削除 -->

      <div class="section">
        <h2>📜 テスト履歴</h2>
        <div class="button-group">
          <button class="btn btn-primary" id="tab1-open-drag-assign">📤 履歴振替（ドラッグ&ドロップ）</button>
        </div>
        <div id="tab1-history"></div>
      </div>
    </div>

    <!-- TAB2 -->
    <div class="content" id="tab2">
      <div class="tab2-content-wrapper">
        <div>
          <div class="section" style="margin-bottom:0;">
            <h2>📁 フォルダ一覧</h2>
            <div id="tab2-folders" class="folder-tree"></div>
            <button class="btn btn-primary" id="tab2-add-folder" style="width:100%; margin-top:12px">+ 新規フォルダ</button>
          </div>
        </div>
        <div>
          <div class="section">
            <h2>⚙️ 設定</h2>
            <div class="form-grid">
              <div class="form-group">
                <label>メールアドレス（送信先）</label>
                <input type="email" id="tab2-email" placeholder="example@gmail.com" />
              </div>
            </div>
          </div>

          <div class="button-group">
            <button class="btn btn-success" id="tab2-save">💾 設定を保存</button>
          </div>

          <div class="tab2-records">
            <h3>📋 格納済み記録</h3>
            <div id="tab2-records-list"></div>
          </div>

          <div class="record-details" style="margin-top:20px;">
            <h3>📊 記録詳細</h3>
            <div id="tab2-record-detail"><div class="empty-message">記録を選択してください</div></div>
          </div>

          <div class="section ebbinghaus-panel">
            <h3 class="ebbinghaus-title">忘却曲線（自動登録・予定一覧）</h3>
            <div id="tab2-schedules"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ドラッグ振替モーダル -->
  <div class="modal" id="dragAssignModal">
    <div class="modal-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <div style="font-weight:800; font-size:1.05rem">履歴振替（ドラッグ＆ドロップ）</div>
        <button class="btn" id="dragAssignClose">閉じる</button>
      </div>
      <div class="drag-assign-container">
        <div>
          <div style="font-weight:700; margin-bottom:8px;">移動元（履歴）</div>
          <div id="drag-assign-list" style="max-height:60vh; overflow:auto"></div>
        </div>
        <div>
          <div style="font-weight:700; margin-bottom:8px;">移動先（フォルダ）</div>
          <div id="drag-assign-folders" style="max-height:60vh; overflow:auto"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- ユーティリティ ---
    const KEY = {
      histories: 'pc_histories_v2',
      folders: 'pc_folders_v2',
      schedules: 'pc_schedules_v2',
      words: 'pc_words_v2',
      settings: 'pc_settings_v2'
    };

    function save(key, value){ localStorage.setItem(key, JSON.stringify(value)) }
    function load(key, fallback){ try{ const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback }catch(e){ return fallback } }
    function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8) }

    // initialize defaults
    let histories = load(KEY.histories, []);
    let folders = load(KEY.folders, []);
    let schedules = load(KEY.schedules, []);
    let words = load(KEY.words, {});
    let settings = load(KEY.settings, {});

    // default folder examples
    if(!folders || folders.length===0){ folders = [ {id: 'f1', name:'未分類'}, {id:'f2', name:'重要'}, {id:'f3', name:'復習'} ]; save(KEY.folders, folders) }

    // --- DOM refs ---
    const tabs = document.querySelectorAll('.tab-button');
    tabs.forEach(t=> t.addEventListener('click', ()=>{ document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active')); t.classList.add('active'); const tab = t.dataset.tab; document.querySelectorAll('.content').forEach(c=>c.classList.remove('active')); document.getElementById(tab).classList.add('active'); }))

    const el = {
      apply: document.getElementById('tab1-apply'),
      save: document.getElementById('tab1-save'),
      export: document.getElementById('tab1-export'),
      clear: document.getElementById('tab1-clear'),
      grid: document.getElementById('tab1-grid'),
      rate: document.getElementById('tab1-rate'),
      wrong: document.getElementById('tab1-wrong'),
      total: document.getElementById('tab1-total'),
      history: document.getElementById('tab1-history'),
      openDrag: document.getElementById('tab1-open-drag-assign'),
      dragModal: document.getElementById('dragAssignModal'),
      dragClose: document.getElementById('dragAssignClose'),
      dragList: document.getElementById('drag-assign-list'),
      dragFolders: document.getElementById('drag-assign-folders'),
      tab2Folders: document.getElementById('tab2-folders'),
      tab2AddFolder: document.getElementById('tab2-add-folder'),
      tab2Save: document.getElementById('tab2-save'),
      tab2Email: document.getElementById('tab2-email'),
      tab2Records: document.getElementById('tab2-records-list'),
      tab2Detail: document.getElementById('tab2-record-detail'),
      tab2Schedules: document.getElementById('tab2-schedules'),
      enableEbb: document.getElementById('tab1-enable-ebbinghaus'),
      mergeSameDay: document.getElementById('tab1-merge-same-day')
    };

    // --- 設定読み込み ---
    function loadSettingsToUI(){ document.getElementById('tab1-title').value = settings.title || '問題セット'; document.getElementById('tab1-count').value = settings.count || 30; document.getElementById('tab1-start').value = settings.start || 11; document.getElementById('tab1-end').value = settings.end || 25; document.getElementById('tab1-per-page').value = settings.perPage || 2; document.getElementById('tab1-custom').value = settings.custom || ''; document.getElementById('tab2-email').value = settings.email || ''; document.getElementById('tab1-enable-ebbinghaus').checked = settings.enableEbb !== false; document.getElementById('tab1-merge-same-day').checked = settings.mergeSameDay !== false }
    loadSettingsToUI();

    // --- フォルダ描画（五十音順） ---
    function sortFolders(a,b){ try{ const collator = new Intl.Collator('ja'); return collator.compare(a.name, b.name) }catch(e){ return a.name.localeCompare(b.name) } }
    function renderFolders(){ folders.sort(sortFolders); el.tab2Folders.innerHTML = ''; folders.forEach(f=>{ const div = document.createElement('div'); div.className = 'folder-item'; div.dataset.id = f.id; div.textContent = f.name; div.addEventListener('click', ()=>{ document.querySelectorAll('.folder-item').forEach(x=>x.classList.remove('active')); div.classList.add('active'); renderRecordsList(f.id) }); el.tab2Folders.appendChild(div) }) }
    renderFolders();

    // --- レコード（履歴）描画 ---
    function renderHistory(){ el.history.innerHTML = ''; if(histories.length===0){ el.history.innerHTML = '<div class="empty-message">履歴がありません</div>'; return }
      histories.slice().reverse().forEach(r=>{ const d = document.createElement('div'); d.className = 'record-item'; d.draggable = true; d.dataset.id = r.id; d.innerHTML = `<div class="record-title">${r.title || '(no title)'} <small style="font-weight:600; font-size:.85rem; opacity:.8; margin-left:6px">${r.folderName? '・'+r.folderName:''}</small></div><div class="record-meta">${new Date(r.created).toLocaleString()}</div>`;
        d.addEventListener('dragstart', ev=>{ ev.dataTransfer.setData('text/plain', r.id); d.classList.add('dragging') });
        d.addEventListener('dragend', ev=>{ d.classList.remove('dragging') });
        d.addEventListener('click', ()=> showRecordDetail(r.id));
        el.history.appendChild(d);
      }) }
    renderHistory();

    function showRecordDetail(id){ const r = histories.find(h=>h.id===id); if(!r){ el.tab2Detail.innerHTML = '<div class="empty-message">見つかりません</div>'; return }
      el.tab2Detail.innerHTML = '';
      const box = document.createElement('div'); box.className = 'record-details'; const title = document.createElement('div'); title.className='record-title'; title.textContent = r.title; box.appendChild(title);
      const meta = document.createElement('div'); meta.className='record-meta'; meta.textContent = '作成: ' + new Date(r.created).toLocaleString(); box.appendChild(meta);
      const list = document.createElement('div'); list.style.marginTop='8px'; r.items.forEach(it=>{ const row = document.createElement('div'); row.style.display='flex'; row.style.justifyContent='space-between'; row.style.padding='6px 0'; row.style.borderBottom='1px dashed #e6e9ef'; row.innerHTML = `<div style="font-weight:700">${it.label}</div><div>${it.page || ''} ${it.correct? '○':'×'}</div>`; list.appendChild(row) }); box.appendChild(list);
      el.tab2Detail.appendChild(box);
    }

    // --- TAB2 records by folder ---
    function renderRecordsList(folderId){ el.tab2Records.innerHTML = ''; const items = histories.filter(h=> (h.folderId||'') === (folderId||'')); if(items.length===0){ el.tab2Records.innerHTML = '<div class="empty-message">このフォルダに記録はありません</div>'; return }
      items.slice().reverse().forEach(r=>{ const d = document.createElement('div'); d.className='record-item'; d.dataset.id = r.id; d.innerHTML = `<div class="record-title">${r.title}</div><div class="record-meta">${new Date(r.created).toLocaleString()}</div>`; d.addEventListener('click', ()=> showRecordDetail(r.id)); el.tab2Records.appendChild(d) }) }

    // --- スケジュール描画 ---
    function renderSchedules(){ el.tab2Schedules.innerHTML = ''; if(schedules.length===0){ el.tab2Schedules.innerHTML = '<div class="empty-message">送信予定はありません</div>'; return }
      const byDate = schedules.slice().sort((a,b)=> a.date.localeCompare(b.date)); byDate.forEach(s=>{
        const div = document.createElement('div'); div.className='list-item'; div.innerHTML = `<div><strong>${s.date}</strong> ${s.to? '→ ' + s.to : ''} <div style="font-size:.85rem; color:#666">${s.items.map(i=>i.title).slice(0,5).join(', ')}${s.items.length>5? '...':''}</div></div><div style="display:flex; gap:6px"><button class="btn btn-primary btn-small">mailto</button></div>`;
        div.querySelector('button').addEventListener('click', ()=>{ // create mailto body
          const subj = encodeURIComponent(`${s.date}の復習予定`);
          const body = encodeURIComponent(s.items.map(it=> `・${it.title} (page:${it.page||''})`).join('\n'));
          const to = s.to || '';
          window.location.href = `mailto:${to}?subject=${subj}&body=${body}`;
        });
        el.tab2Schedules.appendChild(div);
      }) }
    renderSchedules();

    // --- 各ページの問題数計算 ---
    function parseCustomMap(text){ // returns map page->count
      const map = {};
      if(!text) return map;
      text.split(',').map(x=>x.trim()).forEach(part=>{
        if(!part) return;
        const [range, cnt] = part.split(':').map(s=>s.trim()); if(!cnt) return;
        const num = parseInt(cnt,10);
        if(range.includes('-')){ const [a,b] = range.split('-').map(n=>parseInt(n,10)); for(let p=a;p<=b;p++) map[p]=num }
        else{ const p=parseInt(range,10); if(!isNaN(p)) map[p]=num }
      })
      return map;
    }

    function buildGrid(){ const usePages = document.getElementById('tab1-use-pages').checked; const start = parseInt(document.getElementById('tab1-start').value||'1',10); const end = parseInt(document.getElementById('tab1-end').value||'1',10); const perPage = parseInt(document.getElementById('tab1-per-page').value||'1',10); const custom = parseCustomMap(document.getElementById('tab1-custom').value||'');
      const cells = []; if(usePages){ for(let p=start;p<=end;p++){ const cnt = (custom[p] !== undefined) ? custom[p] : perPage; for(let i=0;i<cnt;i++){ cells.push({page:p, idx:i+1}) } } } else {
        const total = parseInt(document.getElementById('tab1-count').value||'0',10); for(let i=0;i<total;i++) cells.push({page:null, idx:i+1}) }
      el.grid.innerHTML = '';
      cells.forEach((c, i)=>{
        const div = document.createElement('div'); div.className='grid-cell correct'; div.dataset.index = i; const num = document.createElement('div'); num.className='num'; num.textContent = (i+1); const page = document.createElement('div'); page.className='page'; page.textContent = c.page? 'p' + c.page : '';
        // add word toggle next to number
        const toggle = document.createElement('input'); toggle.type='checkbox'; toggle.style.marginTop='6px'; toggle.title='単語登録トグル';
        toggle.addEventListener('change', ()=>{ const title = `問題 ${i+1}`; if(toggle.checked){ words[title] = {label:title, page:c.page}; save(KEY.words, words); alert('単語登録しました: ' + title) } else { delete words[title]; save(KEY.words, words); } });
        div.appendChild(num); div.appendChild(page); div.appendChild(toggle); el.grid.appendChild(div);
      });
      // update total
      el.total.textContent = cells.length;
      // dummy stats
      el.rate.textContent = '100.0%'; el.wrong.textContent = '0';
    }

    // Apply settings click
    el.apply.addEventListener('click', ()=>{ settings.title = document.getElementById('tab1-title').value; settings.count = parseInt(document.getElementById('tab1-count').value||'0',10); settings.start = parseInt(document.getElementById('tab1-start').value||'0',10); settings.end = parseInt(document.getElementById('tab1-end').value||'0',10); settings.perPage = parseInt(document.getElementById('tab1-per-page').value||'1',10); settings.custom = document.getElementById('tab1-custom').value; settings.enableEbb = document.getElementById('tab1-enable-ebbinghaus').checked; settings.mergeSameDay = document.getElementById('tab1-merge-same-day').checked; save(KEY.settings, settings); buildGrid(); alert('設定を反映しました'); })

    // clear all data
    el.clear.addEventListener('click', ()=>{ if(!confirm('すべての履歴・フォルダ・スケジュールを削除します。よいですか？')) return; histories=[]; folders=[]; schedules=[]; words={}; save(KEY.histories, histories); save(KEY.folders, folders); save(KEY.schedules, schedules); save(KEY.words, words); renderHistory(); renderFolders(); renderSchedules(); alert('削除しました') })

    // export JSON
    el.export.addEventListener('click', ()=>{ const data = { histories, folders, schedules, words, settings }; const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'pc_backup.json'; a.click(); URL.revokeObjectURL(url); })

    // --- 保存（結果を記録）とスケジュール登録 ---
    el.save.addEventListener('click', ()=>{
      // collect current grid as a record (for demo, use all cells as correct)
      const title = document.getElementById('tab1-title').value || '問題セット';
      const record = { id: uid(), title: title, created: Date.now(), items: [] };
      const cells = el.grid.querySelectorAll('.grid-cell');
      cells.forEach((cell, idx)=>{ const page = cell.querySelector('.page')?.textContent?.replace(/^p/,'') || null; const label = `問題 ${idx+1}`; record.items.push({label, page, correct:true}) });
      // folder: none by default
      histories.push(record); save(KEY.histories, histories); renderHistory(); alert('記録を保存しました');

      // schedule registration
      if(document.getElementById('tab1-enable-ebbinghaus').checked){ const offsets = [1,7,16,35,62]; const base = new Date(); const email = document.getElementById('tab2-email').value || '';
        offsets.forEach(offset=>{
          const d = new Date(base.getFullYear(), base.getMonth(), base.getDate()+offset); const datestr = d.toISOString().slice(0,10);
          // if mergeSameDay true, merge by date + to; else create separate per item
          if(document.getElementById('tab1-merge-same-day').checked){
            let s = schedules.find(x=> x.date===datestr && (x.to||'')===email);
            if(!s){ s = { id: uid(), date: datestr, to: email, items: [] }; schedules.push(s); }
            // add this record as item summary
            s.items.push({ recordId: record.id, title: record.title, page: null });
          } else {
            // create one schedule entry per record per date
            schedules.push({ id: uid(), date: datestr, to: email, items:[{recordId: record.id, title: record.title, page:null}] })
          }
        });
        // normalize schedules: remove duplicate items
        schedules.forEach(s=>{ const uniq = []; const seen = new Set(); s.items.forEach(it=>{ const k = it.recordId || it.title; if(!seen.has(k)){ uniq.push(it); seen.add(k) } }); s.items = uniq });
        // sort schedules by date
        schedules.sort((a,b)=> a.date.localeCompare(b.date)); save(KEY.schedules, schedules); renderSchedules(); alert('忘却曲線の送信予定を登録しました'); }
    });

    // --- ドラッグ＆ドロップ: 履歴をフォルダへ振替 ---
    function openDragModal(){ el.dragModal.classList.add('active'); renderDragAssignLists(); }
    function closeDragModal(){ el.dragModal.classList.remove('active'); }
    el.openDrag.addEventListener('click', openDragModal); el.dragClose.addEventListener('click', closeDragModal);

    function renderDragAssignLists(){ el.dragList.innerHTML = ''; histories.forEach(r=>{ const d = document.createElement('div'); d.className='drag-item'; d.draggable=true; d.dataset.id = r.id; d.innerHTML = `<div style="flex:1"><div style="font-weight:700">${r.title}</div><div style="font-size:.85rem;color:#666">${new Date(r.created).toLocaleString()}</div></div>`;
        d.addEventListener('dragstart', ev=> ev.dataTransfer.setData('text/plain', r.id)); el.dragList.appendChild(d) });
      el.dragFolders.innerHTML = ''; folders.forEach(f=>{ const box = document.createElement('div'); box.className='folder-assign-item'; box.dataset.id = f.id; box.innerHTML = `<div style="flex:1; font-weight:700">${f.name}</div>`; box.addEventListener('dragover', ev=>{ ev.preventDefault(); box.style.background='#e8f4ff' }); box.addEventListener('dragleave', ev=>{ box.style.background='' }); box.addEventListener('drop', ev=>{ ev.preventDefault(); box.style.background=''; const rid = ev.dataTransfer.getData('text/plain'); assignRecordToFolder(rid, f.id); renderDragAssignLists(); renderHistory(); renderFolders(); }); el.dragFolders.appendChild(box) }) }

    function assignRecordToFolder(recordId, folderId){ const record = histories.find(h=>h.id===recordId); const folder = folders.find(ff=>ff.id===folderId); if(record){ record.folderId = folderId; record.folderName = folder?.name || ''; save(KEY.histories, histories); }
    }

    // make tab2 folder area accept dropped records directly
    function enableFolderDropTargets(){ el.tab2Folders.querySelectorAll('.folder-item').forEach(fi=>{
      fi.addEventListener('dragover', ev=>{ ev.preventDefault(); fi.classList.add('active') });
      fi.addEventListener('dragleave', ev=> fi.classList.remove('active') );
      fi.addEventListener('drop', ev=>{ ev.preventDefault(); fi.classList.remove('active'); const rid = ev.dataTransfer.getData('text/plain'); assignRecordToFolder(rid, fi.dataset.id); renderHistory(); renderFolders(); })
    }) }

    // initial enable after render
    setTimeout(enableFolderDropTargets, 300);

    // --- TAB2: add folder ---
    el.tab2AddFolder.addEventListener('click', ()=>{
      const name = prompt('フォルダ名を入力してください'); if(!name) return; const id = uid(); folders.push({id, name}); save(KEY.folders, folders); renderFolders(); enableFolderDropTargets(); });

    // --- TAB2: save settings ---
    el.tab2Save.addEventListener('click', ()=>{ settings.email = el.tab2Email.value; save(KEY.settings, settings); alert('設定を保存しました'); })

    // --- records listing in tab2: clicking folder shows records ---
    // (already handled in renderFolders event)

    // --- schedules initial render ---
    renderSchedules();

    // --- make sure folder drop targets are re-enabled when folders change ---
    const folderObserver = new MutationObserver(()=> enableFolderDropTargets()); folderObserver.observe(el.tab2Folders, {childList:true});

    // --- on load build grid ---
    buildGrid();

    // expose some debug on window for convenience
    window._pc = { histories, folders, schedules, words, settings, saveState: ()=>{ save(KEY.histories, histories); save(KEY.folders, folders); save(KEY.schedules, schedules); save(KEY.words, words); save(KEY.settings, settings); } };
  </script>
</body>
</html>
